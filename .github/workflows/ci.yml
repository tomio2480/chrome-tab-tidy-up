name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit
        # GHSA-mw96-cpmx-2vgc は @crxjs/vite-plugin の rollup 2.79.2 に対する
        # npm advisory 誤検知（タイトル: "Rollup 4 has..." = rollup 4.x 限定の脆弱性）。
        # ビルドツールの依存であり実行時コードには含まれないため critical のみで検出する。
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
